{% extends "dashboard_base.html" %}
{% load static erp_tags %}

{% block dashboard_content %}
<div class="container-fluid py-4">
    <div class="row mb-4 align-items-center">
        <div class="col-md-6">
            <h2 class="fw-bold mb-0">Journal de Caisse</h2>
            <p class="text-muted small mb-0">Suivi des entrées et sorties de trésorerie</p>
        </div>
        <div class="col-md-6">
            <form method="GET" class="d-flex gap-2 justify-content-md-end mt-3 mt-md-0" 
                  hx-get="{% url 'core:cash-journal' %}" 
                  hx-target="#journal-content" 
                  hx-trigger="change from:input"
                  hx-push-url="true">
                <div class="input-group input-group-sm w-auto">
                    <span class="input-group-text bg-white border-0 shadow-sm small">Du</span>
                    <input type="date" name="start_date" class="form-control border-0 shadow-sm px-3" value="{{ start_date|date:'Y-m-d' }}">
                </div>
                <div class="input-group input-group-sm w-auto">
                    <span class="input-group-text bg-white border-0 shadow-sm small">Au</span>
                    <input type="date" name="end_date" class="form-control border-0 shadow-sm px-3" value="{{ end_date|date:'Y-m-d' }}">
                </div>
            </form>
        </div>
    </div>

    <div id="journal-content">
        {% include "core/partials/cash_journal_table.html" %}
    </div>
</div>
{% endblock dashboard_content %}

<!-- Modal HTMX : Code de Déblocage -->
<div id="release-code-modal" class="modal fade show" tabindex="-1" style="display: block; background: rgba(0,0,0,0.5);" aria-modal="true" role="dialog">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-0 pb-0">
                <button type="button" class="btn-close" onclick="document.getElementById('release-code-modal').remove()"></button>
            </div>
            <div class="modal-body text-center p-4 p-md-5">
                <div class="mb-4">
                    <div class="rounded-circle bg-warning bg-opacity-10 d-inline-flex align-items-center justify-content-center shadow-sm" style="width: 80px; height: 80px;">
                        <i class="fas fa-lock fa-2x text-warning"></i>
                    </div>
                </div>
                
                <h3 class="fw-bold text-dark mb-2">Code de Déblocage</h3>
                <p class="text-muted mb-4">Cette opération est sensible. Veuillez saisir le code fourni par votre gérant.</p>

                <form hx-post="{% url 'core:validate-code-ajax' %}" 
                      hx-target="#release-code-modal" 
                      hx-swap="outerHTML">
                    {% csrf_token %}
                    <!-- On passe l'intention de l'opération (ex: remise, annulation) -->
                    <input type="hidden" name="op_type" value="{{ op_type }}">
                    <!-- On peut passer d'autres données pour re-soumettre l'action initiale -->
                    <input type="hidden" name="target_url" value="{{ target_url }}">
                    
                    <div class="mb-4">
                        <input type="text" 
                               name="release_code" 
                               class="form-control form-control-lg text-center fw-bold fs-2 rounded-3 border-2 border-primary border-opacity-25" 
                               placeholder="------" 
                               maxlength="6" 
                               style="letter-spacing: 0.5rem; text-transform: uppercase;"
                               required 
                               autofocus>
                        {% if error %}
                        <div class="text-danger small fw-bold mt-2">
                            <i class="fas fa-exclamation-triangle me-1"></i> {{ error }}
                        </div>
                        {% endif %}
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg py-3 rounded-pill fw-bold shadow">
                            <i class="fas fa-unlock me-2"></i> VALIDER L'OPÉRATION
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

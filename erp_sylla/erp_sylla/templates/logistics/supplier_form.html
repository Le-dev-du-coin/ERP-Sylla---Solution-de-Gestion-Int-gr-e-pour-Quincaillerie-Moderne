{% extends "dashboard_base.html" %}
{% load crispy_forms_tags %}

{% block dashboard_content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-6">
            <div class="d-flex align-items-center mb-4">
                <a href="{% url 'logistics:supplier-list' %}" class="btn btn-light rounded-circle me-3 shadow-sm">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <h2 class="fw-bold mb-0">{% if object %}Modifier{% else %}Nouveau{% endif %} Fournisseur</h2>
            </div>

            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4 p-md-5">
                    <form method="POST">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary btn-lg rounded-3 fw-bold py-2 shadow-sm">
                                <i class="fas fa-save me-2"></i> Enregistrer le fournisseur
                            </button>
                            <a href="{% url 'logistics:supplier-list' %}" class="btn btn-light rounded-3">Annuler</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends "dashboard_base.html" %}

{% block dashboard_content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6">
            <div class="card border-0 shadow-sm rounded-4 text-center p-5">
                <div class="mb-4">
                    <i class="fas fa-trash-alt fa-4x text-danger opacity-25"></i>
                </div>
                <h2 class="fw-bold mb-3">Supprimer l'article ?</h2>
                <p class="text-muted mb-4">Êtes-vous sûr de vouloir supprimer l'article <strong>{{ object.name }}</strong> ? Les transactions de stock associées seront également supprimées.</p>
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger btn-lg rounded-3 fw-bold">Confirmer la suppression</button>
                        <a href="{% url 'inventory:product-list' %}" class="btn btn-light rounded-3">Annuler</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

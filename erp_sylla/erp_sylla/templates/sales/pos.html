{% extends "dashboard_base.html" %}
{% load static %}

{% block dashboard_content %}
<div class="container-fluid p-0">
    <!-- Barre de recherche flottante (Haut) -->
    <div class="sticky-top bg-white shadow-sm p-3 mb-4" style="z-index: 1020; top: -20px; margin-top: -20px;">
        <div class="input-group input-group-lg border rounded-pill overflow-hidden bg-light">
            <span class="input-group-text border-0 bg-transparent ps-4">
                <i class="fas fa-search text-muted"></i>
            </span>
            <input type="text" 
                   name="q" 
                   id="pos-search-input"
                   class="form-control border-0 bg-transparent shadow-none" 
                   placeholder="Rechercher un article..."
                   hx-get="{% url 'sales:ajax-product-search' %}"
                   hx-trigger="keyup changed delay:300ms"
                   hx-target="#search-results"
                   hx-indicator=".search-spinner">
            <div class="search-spinner htmx-indicator p-3">
                <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
            </div>
        </div>
    </div>

    <div class="row g-4 px-3 pb-5">
        <!-- Zone des Résultats de Recherche -->
        <div class="col-12 col-lg-8">
            <div id="search-results" style="max-height: calc(100vh - 200px); overflow-y: auto; padding-bottom: 50px;">
                <div class="text-center py-5 text-muted bg-white rounded-4 shadow-sm">
                    <i class="fas fa-barcode fa-3x mb-3 opacity-25"></i>
                    <p>Saisissez le nom ou la référence d'un article pour commencer la vente.</p>
                </div>
            </div>
        </div>

        <!-- Zone du Panier -->
        <div class="col-12 col-lg-4">
            <div class="card border-0 shadow-sm rounded-4 sticky-lg-top" style="top: 100px;">
                <div class="card-header bg-white py-3 border-bottom d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 fw-bold">Panier</h5>
                    <div id="cart-counter-container">
                        <span class="badge bg-primary rounded-pill">{{ basket.total_items }} article{{ basket.total_items|pluralize }}</span>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div id="cart-container">
                        {% include "sales/_cart_detail.html" %}
                    </div>
                </div>
                <div id="cart-summary">
                    <!-- Le footer est géré par le fragment _cart_detail.html via OOB -->
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Styles spécifiques au POS -->
<style>
    #content { padding-top: 0 !important; }
    .search-spinner { display: none; }
    .htmx-request .search-spinner { display: block; }
    .product-result-card { transition: all 0.2s; }
    .product-result-card:hover { transform: scale(1.005); background-color: #f8fafc; }
    
    @media (max-width: 991px) {
        .sticky-top { top: 0 !important; margin-top: 0 !important; }
    }
</style>

<!-- Script minimaliste et sécurisé pour le POS -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // CSRF Token Setup for HTMX
        document.body.addEventListener('htmx:configRequest', (event) => {
            event.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
        });
    });
</script>
{% endblock %}

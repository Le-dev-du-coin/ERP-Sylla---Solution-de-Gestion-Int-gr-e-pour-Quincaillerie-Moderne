{% load erp_tags %}
<!-- Modal Versement (Générique) -->
<div class="modal fade" id="paymentModal{{ customer.id }}" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <form hx-post="{% url 'sales:customer-payment' customer.id %}" 
                  hx-target="#payment-error-zone{{ customer.id }}"
                  hx-indicator="#payment-spinner{{ customer.id }}"
                  hx-disabled-elt="#submit-payment{{ customer.id }}">
                {% csrf_token %}
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Versement : {{ customer.name }}</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <!-- Zone d'affichage des erreurs -->
                    <div id="payment-error-zone{{ customer.id }}"></div>

                    <div class="alert alert-light border-0 rounded-3 mb-4">
                        <small class="text-muted d-block">Dette actuelle</small>
                        <span class="fs-4 fw-bold text-danger">{{ customer.balance|money }}</span>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Montant du versement (F CFA)</label>
                        <input type="number" name="amount" class="form-control form-control-lg rounded-3" 
                               placeholder="Ex: 50000" required>
                        <div class="form-text text-muted">Saisissez le montant exact apporté par le client.</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Mode de paiement</label>
                        <select name="payment_method" class="form-select rounded-3">
                            <option value="CASH">Espèces</option>
                            <option value="ORANGE">Orange Money</option>
                            <option value="WAVE">Wave</option>
                            <option value="MOOV">Moov Money</option>
                            <option value="CHEQUE">Chèque</option>
                        </select>
                    </div>

                    <div class="mb-0">
                        <label class="form-label fw-bold">Notes / Référence</label>
                        <textarea name="notes" class="form-control rounded-3" rows="2" placeholder="Motif du versement..."></textarea>
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <div id="payment-spinner{{ customer.id }}" class="htmx-indicator me-auto ps-4">
                        <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                        <span class="small ms-2 text-primary">Traitement...</span>
                    </div>
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Annuler</button>
                    <button type="submit" id="submit-payment{{ customer.id }}" class="btn btn-primary rounded-pill px-4 shadow-sm">
                        VALIDER LE PAIEMENT
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
